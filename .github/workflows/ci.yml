name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  windows-lint:
    name: Windows lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $files = 'install.ps1', 'config/Microsoft.PowerShell_profile.ps1'
          $failed = $false
          foreach ($f in $files) {
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $f), [ref]$null, [ref]$errs) | Out-Null
            if ($errs) {
              Write-Host "::error file=$f::parse errors"
              $errs | ForEach-Object { Write-Host $_.Message }
              $failed = $true
            } else {
              Write-Host "OK: $f"
            }
          }
          if ($failed) { exit 1 }

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          $r = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          $r | Format-Table -AutoSize
          if ($r) { exit 1 }

  ubuntu-lint:
    name: Ubuntu lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse bash scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n install-ubuntu.sh
          bash -n config/bashrc

      - name: ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -s bash install-ubuntu.sh config/bashrc

  windows-install:
    name: Windows install + verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run installer (-NoSsh)
        shell: pwsh
        run: .\install.ps1 -NoSsh

      - name: Verify CLI tools are on PATH
        shell: pwsh
        run: |
          $env:Path = "$env:USERPROFILE\scoop\shims;$env:Path"
          $tools = 'git', 'gh', 'rg', 'fd', 'bat', 'fzf', 'jq', '7z', 'eza', 'vim', 'zoxide', 'node', 'npm', 'npx'
          $missing = @()
          foreach ($t in $tools) {
            if (Get-Command $t -ErrorAction SilentlyContinue) { Write-Host "OK: $t" }
            else { Write-Host "::error::missing tool: $t"; $missing += $t }
          }
          if ($missing) { exit 1 }

      - name: Verify the profile loads cleanly
        shell: pwsh
        run: |
          . $PROFILE
          if (-not (Test-Path Function:\ll)) { Write-Host "::error::profile did not define 'll'"; exit 1 }
          foreach ($fn in 'gst', 'gd', 'gdca', 'glog', 'gsh') {
            if (-not (Test-Path "Function:\$fn")) { Write-Host "::error::profile did not define git shortcut '$fn'"; exit 1 }
          }
          Write-Host "profile loaded OK"

  ubuntu-install:
    name: Ubuntu install + verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run installer (--no-ssh)
        shell: bash
        run: |
          set -euo pipefail
          bash ./install-ubuntu.sh --no-ssh

      - name: Verify CLI tools are on PATH
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          tools=(git gh rg fd bat fzf jq 7z eza vim zoxide node npm npx)
          missing=()
          for tool in "${tools[@]}"; do
            if command -v "$tool" >/dev/null 2>&1; then
              echo "OK: $tool"
            else
              echo "::error::missing tool: $tool"
              missing+=("$tool")
            fi
          done
          if ((${#missing[@]})); then exit 1; fi

      - name: Verify bash profile loads cleanly
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.local/bin:$PATH"
          shopt -s expand_aliases
          # shellcheck source=/dev/null
          source "$HOME/.bashrc.d/cli-setup.bash"
          for name in ll gst gd gdca glog gsh; do
            type "$name" >/dev/null
            echo "OK: $name"
          done
