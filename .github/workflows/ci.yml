name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  windows-lint:
    name: Windows lint
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $files = 'install-windows.ps1', 'add-windows-admin-ssh-key.ps1', 'profiles/powershell-profile.ps1'
          $failed = $false
          foreach ($f in $files) {
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $f), [ref]$null, [ref]$errs) | Out-Null
            if ($errs) {
              Write-Host "::error file=$f::parse errors"
              $errs | ForEach-Object { Write-Host $_.Message }
              $failed = $true
            } else {
              Write-Host "OK: $f"
            }
          }
          if ($failed) { exit 1 }

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-PSRepository -Name PSGallery -ErrorAction SilentlyContinue)) {
            Register-PSRepository -Default
          }
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck -Repository PSGallery
          $r = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          $r | Format-Table -AutoSize
          if ($r) { exit 1 }

  ubuntu-lint:
    name: Ubuntu lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Parse bash scripts
        shell: bash
        run: |
          set -euo pipefail
          bash -n install-ubuntu.sh
          bash -n profiles/ubuntu-bashrc

      - name: ShellCheck
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck
          shellcheck -s bash install-ubuntu.sh profiles/ubuntu-bashrc

  windows-install:
    name: Windows install + verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run installer (-NoSsh)
        shell: pwsh
        run: .\install-windows.ps1 -NoSsh

      - name: Verify CLI tools are on PATH
        shell: pwsh
        run: |
          $npmPrefix = (npm config get prefix 2>$null | Select-Object -First 1)
          $extraPaths = @(
            "$env:USERPROFILE\scoop\shims",
            "$env:LOCALAPPDATA\Programs\OpenAI\Codex\bin",
            "$env:USERPROFILE\.local\bin",
            $npmPrefix
          ) | Where-Object { $_ -and (Test-Path $_) }
          $env:Path = (($extraPaths + @($env:Path)) -join ';')
          $tools = 'git', 'gh', 'rg', 'fd', 'bat', 'fzf', 'jq', '7z', 'eza', 'vim', 'zoxide', 'node', 'npm', 'npx', 'codex', 'claude'
          $missing = @()
          foreach ($t in $tools) {
            if (Get-Command $t -ErrorAction SilentlyContinue) { Write-Host "OK: $t" }
            else { Write-Host "::error::missing tool: $t"; $missing += $t }
          }
          if ($missing) { exit 1 }

      - name: Verify the profile loads cleanly
        shell: pwsh
        run: |
          . $PROFILE
          foreach ($fn in 'l', 'll') {
            if (-not (Test-Path "Function:\$fn")) { Write-Host "::error::profile did not define '$fn'"; exit 1 }
          }
          foreach ($fn in 'gst', 'gd', 'gdca', 'glog', 'gsh') {
            if (-not (Test-Path "Function:\$fn")) { Write-Host "::error::profile did not define git shortcut '$fn'"; exit 1 }
          }
          Write-Host "profile loaded OK"

  ubuntu-install:
    name: Ubuntu install + verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Run installer as root (--no-ssh; creates the target user)
        shell: bash
        run: |
          set -euo pipefail
          # The installer must run as root; it creates CLI_USER and installs the
          # whole environment for them in one pass. --no-ssh so CI never touches
          # the runner's sshd. `env -u SUDO_USER` mimics a direct root login.
          # No CLI_PASSWORD: exercise the random-password path. The verify step
          # only asserts a password got set (passwd -S status P), not its value.
          sudo env -u SUDO_USER CLI_USER=ciuser bash ./install-ubuntu.sh --no-ssh

      - name: Verify user, group, and passwordless sudo
        shell: bash
        run: |
          # Report each check explicitly rather than dying silently on set -e.
          set -uo pipefail
          rc=0
          id ciuser || rc=1
          # Membership via substring on a captured string (a `grep -q` pipe would
          # SIGPIPE its upstream and trip pipefail even on success).
          groups_list=" $(id -nG ciuser 2>/dev/null) "
          if [[ "$groups_list" != *" sudo "* ]]; then echo "::error::ciuser not in sudo group:$groups_list"; rc=1; fi
          # Needs sudo: /etc/sudoers.d is mode 0750 root, unreadable to the runner user.
          if ! sudo test -f /etc/sudoers.d/90-ciuser-nopasswd; then echo "::error::sudoers drop-in missing"; rc=1; fi
          if ! sudo visudo -cf /etc/sudoers.d/90-ciuser-nopasswd; then echo "::error::visudo check failed"; rc=1; fi
          # The whole point: sudo without a password prompt.
          if ! sudo -n -u ciuser sudo -n true; then echo "::error::passwordless sudo not working"; rc=1; fi
          if [[ $rc -eq 0 ]]; then echo "passwordless sudo OK for ciuser"; fi
          exit $rc

      - name: Verify console password and ~/.ssh scaffolding
        shell: bash
        run: |
          set -uo pipefail
          rc=0
          # A console login password must be set (status P) so VNC/serial login works.
          if [[ "$(sudo passwd -S ciuser | awk '{print $2}')" != "P" ]]; then
            echo "::error::ciuser has no login password"; rc=1
          fi
          # ~/.ssh must be 0700 and owned by ciuser (it is unreadable to the runner).
          perm=$(sudo stat -c '%a %U' /home/ciuser/.ssh)
          if [[ "$perm" != "700 ciuser" ]]; then echo "::error::.ssh perms/owner wrong: $perm"; rc=1; fi
          # authorized_keys must exist, be empty, 0600, owned by ciuser.
          ak=$(sudo stat -c '%a %U %s' /home/ciuser/.ssh/authorized_keys)
          if [[ "$ak" != "600 ciuser 0" ]]; then echo "::error::authorized_keys wrong: $ak"; rc=1; fi
          if [[ $rc -eq 0 ]]; then echo "console password + ~/.ssh scaffolding OK"; fi
          exit $rc

      - name: Verify CLI tools are on PATH (in ciuser's home)
        shell: bash
        run: |
          set -uo pipefail
          # Tools land in ciuser's ~/.local/bin; check as that user. Plain `sudo -u`
          # (not -i): sudo -i flattens the multi-line command, breaking the loop.
          sudo -u ciuser -H bash -c '
            export PATH="$HOME/.local/bin:$PATH"
            rc=0
            for tool in git gh rg fd bat fzf jq 7z eza vim zoxide node npm npx codex claude; do
              if command -v "$tool" >/dev/null 2>&1; then echo "OK: $tool"; else echo "::error::missing for ciuser: $tool"; rc=1; fi
            done
            exit $rc
          '

      - name: Verify bash profile loads cleanly (as ciuser)
        shell: bash
        run: |
          set -uo pipefail
          sudo -u ciuser -H bash -c '
            set -euo pipefail
            export PATH="$HOME/.local/bin:$PATH"
            shopt -s expand_aliases
            source "$HOME/.bashrc.d/cli-setup.bash"
            for name in l ll gst gd gdca glog gsh; do
              type "$name" >/dev/null
              echo "OK: $name"
            done
          '

      - name: Verify Ubuntu fzf key bindings (as ciuser)
        shell: bash
        run: |
          set -uo pipefail
          sudo -u ciuser -H bash -ic '
            set -e
            export PATH="$HOME/.local/bin:$PATH"
            test -r "$HOME/.bashrc.d/cli-setup.bash"
            grep -F "key-bindings.bash" "$HOME/.bashrc.d/cli-setup.bash" >/dev/null
            grep -F "completion.bash" "$HOME/.bashrc.d/cli-setup.bash" >/dev/null
            if [[ ! -r /usr/share/doc/fzf/examples/key-bindings.bash && ! -r /usr/share/fzf/key-bindings.bash ]]; then
              echo "::error::fzf key-bindings.bash was not installed"; exit 1
            fi
            source "$HOME/.bashrc.d/cli-setup.bash"
            echo "fzf Ctrl+T/Ctrl+R bindings loaded"
          '
