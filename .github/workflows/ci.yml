name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint (parse + PSScriptAnalyzer)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse PowerShell scripts
        shell: pwsh
        run: |
          $files = 'install.ps1', 'config/Microsoft.PowerShell_profile.ps1'
          $failed = $false
          foreach ($f in $files) {
            $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path $f), [ref]$null, [ref]$errs) | Out-Null
            if ($errs) {
              Write-Host "::error file=$f::parse errors"
              $errs | ForEach-Object { Write-Host $_.Message }
              $failed = $true
            } else {
              Write-Host "OK: $f"
            }
          }
          if ($failed) { exit 1 }

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser -SkipPublisherCheck
          $r = Invoke-ScriptAnalyzer -Path . -Recurse -Severity Error
          $r | Format-Table -AutoSize
          if ($r) { exit 1 }

  install:
    name: Install + verify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      # Runs the full installer except the OpenSSH step (-NoSsh), which would
      # reconfigure the runner's sshd. The runner is elevated, so scoop installs
      # with -RunAsAdmin (handled inside the script).
      - name: Run installer (-NoSsh)
        shell: pwsh
        run: .\install.ps1 -NoSsh

      - name: Verify CLI tools are on PATH
        shell: pwsh
        run: |
          $env:Path = "$env:USERPROFILE\scoop\shims;$env:Path"
          $tools = 'git', 'gh', 'rg', 'fd', 'bat', 'fzf', 'jq', '7z', 'eza', 'vim', 'zoxide'
          $missing = @()
          foreach ($t in $tools) {
            if (Get-Command $t -ErrorAction SilentlyContinue) { Write-Host "OK: $t" }
            else { Write-Host "::error::missing tool: $t"; $missing += $t }
          }
          if ($missing) { exit 1 }

      - name: Verify the profile loads cleanly
        shell: pwsh
        run: |
          # zoxide / PSFzf / PSReadLine bindings are all guarded, so dot-sourcing
          # the installed profile must succeed without throwing.
          . $PROFILE
          if (-not (Test-Path Function:\ll)) { Write-Host "::error::profile did not define 'll'"; exit 1 }
          # Git shortcuts (oh-my-zsh style, read-only) are defined as functions.
          foreach ($fn in 'gst', 'gd', 'gdca', 'glog', 'gsh') {
            if (-not (Test-Path "Function:\$fn")) { Write-Host "::error::profile did not define git shortcut '$fn'"; exit 1 }
          }
          Write-Host "profile loaded OK"
